    <text x="15" y="67" class="text-body-private">- BASE_PRICES : Map&lt;Size, BigDecimal&gt; {static}</text>
    <text x="15" y="82" class="text-body-private">- toppings : List&lt;Topping&gt;</text>
    <text x="15" y="97" class="text-body-private">- base : BaseType</text>
