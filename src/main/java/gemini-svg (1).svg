    <line x1="0" y1="35" x2="280" y2="35" class="line"/>
    <text x="15" y="52" class="text-body-private">- items : List&lt;OrderItem&gt;</text>
    <text x="15" y="67" class="text-body-private">- orderTime : LocalDateTime</text>
    <line x1="0" y1="75" x2="280" y2="75" class="line"/>
    <text x="15" y="92" class="text-body-public">+ addItem(item : OrderItem) : void</text>
    <text x="15" y="105" class="text-body-public">+ getItems() : List&lt;OrderItem&gt;</text>
    <text x="15" y="118" class="text-body-public">+ isEmpty() : boolean</text>
    <text x="15" y="131" class="text-body-public">+ getTotal() : BigDecimal</text>
    <text x="15" y="144" class="text-body-public">+ clear() : void</text>
  </g>
  <path d="M 325, 120 L 425, 120" class="arrow" marker-start="url(#aggregation)"/>
  <text x="340" y="112" class="text-body" style="font-size: 10px;">contains *</text>

