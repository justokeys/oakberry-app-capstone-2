<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1550" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #fcfbf9; }
      .border { stroke: #d3c7b5; stroke-width: 1.5; fill: #f5f2eb; rx: 6px; }
      .abstract-border { stroke: #b19ffb; stroke-width: 2; fill: #f3f0ff; rx: 6px; }
      .interface-border { stroke: #7fb5f5; stroke-width: 2; fill: #edf5ff; rx: 6px; }
      .enum-border { stroke: #e2975d; stroke-width: 1.5; fill: #fff7f0; rx: 6px; }
      .text-title { font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif; font-size: 15px; font-weight: bold; fill: #3c352a; text-anchor: middle; }
      .text-body { font-family: 'SF Pro Text', -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #4a4235; }
      .text-body-private { font-family: 'SF Pro Text', -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #72624d; }
      .text-body-public { font-family: 'SF Pro Text', -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #1d6cd1; font-weight: 500; }
      .text-stereotype { font-family: 'SF Pro Text', -apple-system, 'Segoe UI', sans-serif; font-size: 11px; font-style: italic; fill: #625949; text-anchor: middle; }
      .line { stroke: #8a7a65; stroke-width: 1; }
      .line-dashed { stroke: #6b9ee2; stroke-width: 1.5; stroke-dasharray: 5,5; }
      .line-extends { stroke: #8062f7; stroke-width: 1.5; }
      .line-dependency { stroke: #a19582; stroke-width: 1.2; stroke-dasharray: 4,4; }
      .arrow { fill: none; stroke: #8a7a65; stroke-width: 1.5; }
    </style>
    
    <marker id="arrow-empty" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcfbf9" stroke="#8a7a65" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-interface" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#edf5ff" stroke="#7fb5f5" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-abstract" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f3f0ff" stroke="#b19ffb" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-depend" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9" fill="none" stroke="#a19582" stroke-width="1.2"/>
    </marker>
    <marker id="aggregation" viewBox="0 0 12 10" refX="0" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 5 L 6 1 L 12 5 L 6 9 z" fill="#fcfbf9" stroke="#8a7a65" stroke-width="1.5"/>
    </marker>
    <marker id="composition-has" viewBox="0 0 12 10" refX="0" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 5 L 6 1 L 12 5 L 6 9 z" fill="#8a7a65" stroke="#8a7a65" stroke-width="1"/>
    </marker>
