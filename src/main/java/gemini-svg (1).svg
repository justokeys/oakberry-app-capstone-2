    <text x="15" y="162" class="text-body-public">+ getDescription() : String {Override}</text>
    <text x="15" y="175" class="text-body-public">+ setHempBoost(hempBoost : boolean) : void</text>
  </g>
  <path d="M 205, 430 L 205, 390 L 510, 390 L 510, 345" class="line-extends" marker-end="url(#arrow-abstract)"/>

