  <rect width="100%" height="100%" class="bg"/>

  <text x="550" y="30" font-family="'SF Pro Display', sans-serif" font-size="22px" font-weight="bold" fill="#3c352a" text-anchor="middle">Oakberry Açaí Application - Complete Class Diagram</text>

  <g transform="translate(425, 80)">
    <rect width="250" height="85" class="interface-border"/>
    <text x="125" y="20" class="text-stereotype">«interface»</text>
    <text x="125" y="38" class="text-title" style="fill: #164fa5;">OrderItem</text>
    <line x1="0" y1="46" x2="250" y2="46" class="line" style="stroke: #7fb5f5;"/>
    <text x="15" y="62" class="text-body-public">+ getPrice() : BigDecimal</text>
    <text x="15" y="76" class="text-body-public">+ getDescription() : String</text>
  </g>

